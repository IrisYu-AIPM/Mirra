<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Mirra</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f14; --card:#1a1a24; --hover:#1e1e30;
  --gold:#f0c040; --gold-d:rgba(240,192,64,.15); --gold-b:rgba(240,192,64,.4);
  --txt:#e8e8f0; --sub:#8888aa; --dim:#444466;
  --bdr:rgba(255,255,255,.07); --bdr2:rgba(255,255,255,.13);
  --grn:#4caf80; --red:#f06060; --blu:#60a0f0;
  --orange:#e8904a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans SC',sans-serif;
  font-size:13px;line-height:1.6;
  background:var(--bg);color:var(--txt);
  display:flex;flex-direction:column;
}

/* ── HEADER ── */
#hdr{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px 9px;border-bottom:1px solid var(--bdr);
  background:linear-gradient(135deg,#12121c,#1a1a28);
}
.ttl{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.02em}
.mirra-m{color:var(--gold);font-size:13px}
.sub{font-size:11px;color:var(--dim);margin-top:1px}
.badge{display:flex;align-items:center;gap:5px;background:var(--gold-d);border:1px solid var(--gold-b);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:700;color:var(--gold)}
.badge b{font-family:'JetBrains Mono',monospace;font-size:14px}

/* ── MAIN ── */
#main{flex:1 1 0;min-height:0;overflow-y:scroll;overflow-x:hidden;padding:10px;display:flex;flex-direction:column;gap:8px}
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── FOOTER ── */
#ftr{flex:0 0 auto;padding:10px;border-top:1px solid var(--bdr);background:var(--bg)}

/* ── ERROR ── */
#err{display:none;position:relative;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.35);border-radius:6px;padding:8px 34px 8px 11px;color:var(--red);font-size:12px;line-height:1.5}
#err.on{display:block}
#errX{position:absolute;top:5px;right:8px;background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;line-height:1;padding:0}

/* ── SECTION ── */
.sec{background:var(--card);border:1px solid var(--bdr);border-radius:10px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;user-select:none;border-bottom:1px solid var(--bdr);border-radius:10px 10px 0 0;transition:background .15s}
.sec-hdr:hover{background:var(--hover)}
.sec-hdr.collapsed{border-bottom:none;border-radius:10px}
.sec-ttl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em}
.chv{font-size:10px;color:var(--dim);transition:transform .2s}
.chv.open{transform:rotate(180deg)}
.sec-body{padding:11px 13px;display:flex;flex-direction:column;gap:7px}
.sec-body.hidden{display:none}
.hidden{display:none !important}

/* ── FORM ── */
label.lbl{display:block;font-size:11px;color:var(--sub);font-weight:500;margin-bottom:3px}
.inp{width:100%;background:#0b0b17;border:1px solid var(--bdr2);border-radius:6px;padding:7px 9px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim)}
select.inp{cursor:pointer}
.btn{width:100%;padding:7px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid}
.btn-gold{background:var(--gold-d);border-color:var(--gold-b);color:var(--gold)}
.btn-gold:hover{background:rgba(240,192,64,.28)}
.btn-grn{background:rgba(76,175,128,.1);border-color:rgba(76,175,128,.3);color:var(--grn)}
.btn-grn:hover{background:rgba(76,175,128,.22)}
.btn-ghost{background:transparent;border-color:var(--bdr2);color:var(--sub)}
.btn-ghost:hover{border-color:var(--red);color:var(--red);background:rgba(240,96,96,.05)}

/* ── PINS ── */
.pin{background:#12121c;border:1px solid var(--bdr);border-radius:6px;padding:9px 10px}
.pin.u{border-left:2px solid var(--gold)}.pin.a{border-left:2px solid var(--blu)}.pin.n{border-left:2px solid var(--grn)}
.pin-meta{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.tag{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.u .tag{background:var(--gold-d);color:var(--gold)}.a .tag{background:rgba(96,160,240,.12);color:var(--blu)}.n .tag{background:rgba(76,175,128,.12);color:var(--grn)}
.pin-t{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.pin-text{font-size:12px;color:var(--txt);line-height:1.55;word-break:break-word;white-space:pre-wrap}
.pin-text.clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:normal}
.pin-row{display:flex;align-items:center;gap:6px;margin-top:5px}
.btn-sm{font-size:11px;background:none;border:none;cursor:pointer;padding:1px 4px;border-radius:3px;transition:all .15s}
.btn-exp{color:var(--sub);text-decoration:underline dotted}.btn-exp:hover{color:var(--txt)}
.btn-rm{color:var(--dim);margin-left:auto}.btn-rm:hover{color:var(--red);background:rgba(240,96,96,.1)}
.empty{text-align:center;padding:18px 10px;color:var(--dim);font-size:12px}
.empty-i{font-size:22px;margin-bottom:7px}

/* ── NOTE ── */
.note-ta{width:100%;background:#0b0b17;border:1px solid var(--bdr2);border-radius:6px;padding:8px 9px;color:var(--txt);font-family:'Noto Sans SC',sans-serif;font-size:12px;resize:vertical;min-height:70px;outline:none;transition:border-color .15s}
.note-ta:focus{border-color:var(--grn)}
.note-ta::placeholder{color:var(--dim)}

/* ── ASSETS ── */
.asset-block{border-radius:10px;overflow:hidden;border:1px solid var(--bdr)}
.asset-block-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:8px 14px;border-bottom:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--sub)}

/* Hook block */
.hook-block{}
.hook-row{padding:10px 14px;display:flex;gap:10px;align-items:flex-start}
.hook-row.surface{background:rgba(255,255,255,.02)}
.hook-row.real{background:rgba(240,150,74,.08)}
.hook-row.shift{background:rgba(76,175,128,.07)}
.hook-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.surface .hook-badge{background:rgba(255,255,255,.08);color:var(--sub)}
.real .hook-badge{background:rgba(240,150,74,.2);color:var(--orange)}
.shift .hook-badge{background:rgba(76,175,128,.15);color:var(--grn)}
.hook-text{font-size:13px;line-height:1.6}
.hook-arrow{text-align:center;padding:4px;color:var(--dim);font-size:12px;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr)}

/* Belief update */
.belief-block .belief-row{display:flex;gap:8px;padding:12px 14px;align-items:stretch}
.belief-old,.belief-new{flex:1;padding:10px 12px;border-radius:7px;font-size:12px;line-height:1.55}
.belief-old{background:rgba(240,96,96,.07);border:1px solid rgba(240,96,96,.18);color:var(--sub);text-decoration:line-through}
.belief-new{background:rgba(76,175,128,.08);border:1px solid rgba(76,175,128,.2);color:var(--grn)}
.b-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;opacity:.7}
.belief-arr{align-self:center;color:var(--dim);font-size:16px;flex-shrink:0}

/* Action pack */
.action-block{}
.ap-section{padding:11px 14px;border-bottom:1px solid var(--bdr)}
.ap-section:last-child{border-bottom:none}
.ap-sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ap-beliefs .ap-sec-label{color:var(--blu)}
.ap-actions .ap-sec-label{color:var(--grn)}
.ap-open .ap-sec-label{color:var(--dim)}
.ap-next .ap-sec-label{color:var(--gold)}
.ap-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.ap-list li{font-size:12px;padding-left:14px;position:relative;line-height:1.55}
.ap-list li::before{content:'·';position:absolute;left:3px}
.ap-beliefs .ap-list li::before{color:var(--blu)}
.ap-open-list li{color:var(--sub);font-style:italic}
.ap-open-list li::before{color:var(--dim)}
.ap-action-list{display:flex;flex-direction:column;gap:6px}
.ap-action{display:flex;gap:8px;align-items:flex-start;font-size:12px}
.ap-when{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(76,175,128,.12);color:var(--grn);padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.ap-what{line-height:1.6;flex:1;min-width:0;word-break:break-word}
.next-prompt-box{font-size:12px;line-height:1.65;background:#0b0b17;border:1px solid var(--bdr2);border-radius:6px;padding:10px 12px;color:var(--txt);margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
.btn-cp-prompt{padding:5px 13px;background:var(--gold-d);border:1px solid var(--gold-b);border-radius:6px;color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-cp-prompt:hover{background:rgba(240,192,64,.28)}

/* ── 升级版 belief ── */
.belief-before{padding:12px 14px 0;color:var(--sub)}
.b-lbl-old{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:4px}
.b-txt-old{font-size:13px;line-height:1.6;text-decoration:line-through;opacity:.6}
.belief-arrow-row{padding:8px 14px;display:flex;align-items:center}
.b-arrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.04em;text-transform:uppercase}
.belief-after{padding:0 14px 10px}
.b-txt-new{font-size:14px;font-weight:600;line-height:1.6;color:var(--txt)}
.belief-impact{margin:0 14px 12px;padding:8px 12px;background:rgba(240,192,64,.07);border-left:2px solid var(--gold-b);border-radius:0 6px 6px 0;font-size:12px;color:var(--sub);line-height:1.55}
.b-impact-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-right:6px}

/* ── 升级版 insights ── */
.ap-insights .ap-sec-label{color:var(--gold)}
.insights-list{display:flex;flex-direction:column;gap:8px}
.insight-item{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.6}
.insight-n{width:20px;height:20px;border-radius:50%;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:2px}

/* ── PIN ANNOTATION ── */
.pin-anno{font-size:11px;color:#6caa88;background:rgba(76,175,128,.08);border:1px solid rgba(76,175,128,.18);border-radius:5px;padding:5px 9px;margin-top:5px;line-height:1.5}

/* ── PORTRAIT BLOCK ── */
.portrait-block{}
.portrait-text{padding:14px;font-size:13px;line-height:1.75;color:#c8d8f0;font-style:italic;border-left:2px solid rgba(96,160,240,.5);margin:12px 14px;background:rgba(96,160,240,.05);border-radius:0 6px 6px 0}

/* ── LIBRARY ── */
.ftr-row{display:flex;gap:7px;margin-top:7px}
.btn-lib{flex:1;background:rgba(96,160,240,.08);border:1px solid rgba(96,160,240,.25);color:#60a0f0;border-radius:8px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;position:relative;overflow:hidden}
.btn-lib:hover{background:rgba(96,160,240,.22);border-color:rgba(96,160,240,.6);color:#90c8ff;transform:translateY(-1px);box-shadow:0 4px 14px rgba(96,160,240,.2)}
.btn-lib:active{transform:translateY(0)}
.btn-lib.pulse{animation:lib-pulse .6s ease}
@keyframes lib-pulse{0%{box-shadow:0 0 0 0 rgba(96,160,240,.5)}70%{box-shadow:0 0 0 8px rgba(96,160,240,0)}100%{box-shadow:0 0 0 0 rgba(96,160,240,0)}}
#genStatus{font-size:12px;color:#8888aa;text-align:center;padding:6px 0;min-height:24px}
#libEntry{padding:8px 13px}
#libEntryBtn{width:100%;background:rgba(96,160,240,.06);border:1px solid rgba(96,160,240,.18);color:#5588bb;border-radius:8px;padding:9px 0;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
#libEntryBtn:hover{background:rgba(96,160,240,.16);border-color:rgba(96,160,240,.45);color:#80b8e8;transform:translateY(-1px);box-shadow:0 3px 12px rgba(96,160,240,.15)}
#libEntryBtn:active{transform:translateY(0)}

/* ── GEN BUTTON ── */
.btn-gen{width:100%;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,#c8a020,#f0c040);color:#0f0f14;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:all .2s}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(240,192,64,.4)}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── LOADING ── */
#ld{display:none;position:fixed;inset:0;background:rgba(10,10,18,.88);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(4px)}
#ld.on{display:flex}
.spin{width:34px;height:34px;border:3px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#libraryHint{
  display:none; width:100%; margin-top:8px;
  background:rgba(76,175,128,.08);
  border:1px solid rgba(76,175,128,.28);
  color:#4caf80; border-radius:9px;
  padding:10px 0; font-size:12px; font-weight:700;
  cursor:pointer; font-family:inherit;
  transition:all .18s;
  letter-spacing:.01em;
}
#libraryHint:hover{
  background:rgba(76,175,128,.18);
  border-color:rgba(76,175,128,.6);
  color:#6dcc9e;
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(76,175,128,.18);
}
#libraryHint:active{ transform:translateY(0); box-shadow:none }
#libraryHint.visible{
  display:block;
  animation:hint-slide .3s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes hint-slide{
  from{ opacity:0; transform:translateY(8px) scale(.97) }
  to  { opacity:1; transform:translateY(0) scale(1) }
}

/* ── 命运镜像 ── */
#mirrorSection{margin-top:2px;overflow:visible}
.mirror-trigger{
  width:100%;padding:10px 13px;
  background:linear-gradient(135deg,rgba(240,96,60,.08),rgba(200,60,180,.08));
  border:1px solid rgba(240,96,60,.22);
  border-radius:10px;color:#e07060;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .2s;
  display:flex;align-items:center;justify-content:space-between;
  text-align:left;
}
.mirror-trigger:hover{
  background:linear-gradient(135deg,rgba(240,96,60,.14),rgba(200,60,180,.14));
  border-color:rgba(240,96,60,.45);
  box-shadow:0 4px 20px rgba(240,96,60,.12);
  transform:translateY(-1px);
}
.mirror-trigger:disabled{opacity:.4;cursor:not-allowed;transform:none}
.mirror-trigger-left{display:flex;flex-direction:column;gap:2px}
.mirror-trigger-title{font-size:13px;letter-spacing:.02em}
.mirror-trigger-sub{font-size:10px;color:#aa6060;font-weight:400;letter-spacing:.03em}
.mirror-trigger-icon{font-size:18px;opacity:.7;flex-shrink:0}
.mirror-sessions{font-size:10px;color:#aa6060;font-family:'JetBrains Mono',monospace;flex-shrink:0}

.mirror-card{
  background:linear-gradient(160deg,#14101a,#18101c);
  border:1px solid rgba(200,80,120,.2);
  border-radius:10px;
  margin-top:0;
}
.mirror-header{
  padding:13px 15px 10px;
  border-bottom:1px solid rgba(200,80,120,.15);
  background:rgba(200,80,120,.04);
  display:flex;align-items:center;justify-content:space-between;
}
.mirror-title{
  font-size:13px;font-weight:700;
  background:linear-gradient(90deg,#e07060,#c060c0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.04em;
}
.mirror-sessions-badge{
  font-size:10px;color:#884466;
  font-family:'JetBrains Mono',monospace;
  background:rgba(200,80,120,.08);
  border:1px solid rgba(200,80,120,.15);
  border-radius:4px;padding:2px 8px;
}

/* DNA 特征 */
.mirror-dna{padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.06)}
.mirror-sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#884466;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.dna-item{margin-bottom:10px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:7px;border:1px solid rgba(255,255,255,.06)}
.dna-item:last-child{margin-bottom:0}
.dna-trait{font-size:13px;font-weight:700;color:#d88080;margin-bottom:4px;letter-spacing:.02em}
.dna-evidence{font-size:11px;color:#888899;line-height:1.55;margin-bottom:4px;font-style:italic}
.dna-impact{font-size:12px;color:#c0c0cc;line-height:1.55}

/* 2035 平行时空 */
.mirror-2035{padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.06)}
.parallel-tracks{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.track{border-radius:8px;padding:11px 13px;border:1px solid}
.track-a{background:rgba(180,100,60,.07);border-color:rgba(180,100,60,.2)}
.track-b{background:rgba(80,160,120,.07);border-color:rgba(80,160,120,.2)}
.track-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.track-a .track-label{color:#c07050}
.track-b .track-label{color:#50a080}
.track-scene{font-size:12px;line-height:1.65;color:#b0b0c0}
.pivot-box{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);border-radius:7px;padding:9px 12px}
.pivot-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#a08030;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.pivot-text{font-size:12px;color:#d0c070;line-height:1.55;font-weight:500}

/* 盲点击穿 */
.mirror-blindspot{padding:13px 15px;background:rgba(240,60,60,.04)}
.blindspot-statement{
  font-size:14px;font-weight:700;line-height:1.55;
  color:#e88070;margin-bottom:10px;
  padding:10px 13px;
  background:rgba(240,60,60,.08);
  border:1px solid rgba(240,60,60,.2);
  border-radius:7px;
  border-left:3px solid rgba(240,60,60,.5);
}
.blindspot-pattern{font-size:12px;color:#888899;line-height:1.6;margin-bottom:8px}
.blindspot-cost{
  font-size:12px;color:#c07070;line-height:1.55;
  font-style:italic;
  padding-top:8px;border-top:1px solid rgba(240,60,60,.1);
}
.cost-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#884444;margin-right:6px;font-family:'JetBrains Mono',monospace}

.mirror-loading{
  padding:20px;text-align:center;
  color:#884466;font-size:12px;font-family:'JetBrains Mono',monospace;
  letter-spacing:.04em;
}
.mirror-err{padding:12px 15px;color:#e07060;font-size:12px;line-height:1.5}

/* ── 认知偏向标签 ── */
.bias-bar{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 14px;
  background:rgba(255,255,255,.02);
  border-top:1px solid var(--bdr);
}
.bias-mode{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
  white-space:nowrap;flex-shrink:0;margin-top:1px;
}
.bias-mode.执行型{background:rgba(96,160,240,.12);color:#60a0f0;border:1px solid rgba(96,160,240,.25)}
.bias-mode.战略型{background:rgba(240,192,64,.12);color:#f0c040;border:1px solid rgba(240,192,64,.25)}
.bias-mode.情绪型{background:rgba(200,100,200,.12);color:#c878c8;border:1px solid rgba(200,100,200,.25)}
.bias-mode.分析型{background:rgba(76,175,128,.12);color:#4caf80;border:1px solid rgba(76,175,128,.25)}
.bias-texts{display:flex;flex-direction:column;gap:2px;min-width:0}
.bias-lean{font-size:11px;color:var(--txt);line-height:1.45}
.bias-alert{font-size:10px;color:var(--sub);line-height:1.4;display:flex;align-items:baseline;gap:4px}
.bias-alert-icon{color:var(--red);font-size:10px;flex-shrink:0}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="ttl"><span class="mirra-m">✦</span> Mirra</div>
    <div class="sub">Your thinking has a shape.</div>
  </div>
  <div class="badge"><span style="font-size:11px">✦</span> <b id="cnt">0</b></div>
</div>

<div id="main">
  <div id="err"><button id="errX">×</button><span id="errMsg"></span></div>

  <!-- API配置 -->
  <div class="sec">
    <div class="sec-hdr" id="hAPI"><span class="sec-ttl">⚙️ API 配置</span><span class="chv" id="cAPI">▼</span></div>
    <div class="sec-body" id="bAPI">
      <div><label class="lbl">API 提供商</label>
        <select class="inp" id="provider">
          <option value="gemini">Google Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI 兼容（自定义）</option>
        </select>
      </div>
      <div><label class="lbl">API Key</label><input type="password" class="inp" id="apiKey" placeholder="粘贴你的 API Key…" autocomplete="off"></div>
      <div id="epRow" style="display:none"><label class="lbl">自定义 Endpoint</label><input type="text" class="inp" id="apiEp" placeholder="https://…"></div>
      <button class="btn btn-gold" id="btnSave">💾 保存配置</button>
    </div>
    <div id="libEntry">
      <button id="libEntryBtn">📚 Mirra 资产库</button>
    </div>
  </div>

  <!-- 灵感篮子 -->
  <div class="sec">
    <div class="sec-hdr" id="hBask"><span class="sec-ttl">🧺 灵感篮子</span><span class="chv open" id="cBask">▼</span></div>
    <div class="sec-body" id="bBask">
      <div id="pinList"><div class="empty"><div class="empty-i">📎</div><div>前往 AI Studio 页面<br>点击「📎 钉选」开始收集</div></div></div>
    </div>
  </div>

  <!-- 随记 -->
  <div class="sec">
    <div class="sec-hdr" id="hNote"><span class="sec-ttl">✍️ 实时随记</span><span class="chv open" id="cNote">▼</span></div>
    <div class="sec-body" id="bNote">
      <textarea class="note-ta" id="noteTA" placeholder="记录此刻的思考、疑问或灵感…&#10;&#10;随记将与 Pin 片段一起送入分析。"></textarea>
      <button class="btn btn-grn" id="btnNote">💾 保存思考</button>
    </div>
  </div>

  <!-- 认知资产输出 -->
  <div class="sec" id="secAssets" style="display:none">
    <div class="sec-hdr"><span class="sec-ttl">✨ 认知资产</span><span class="chv open">▼</span></div>
    <div class="sec-body" id="assetsBody" style="gap:10px"></div>
  </div>
</div>

<!-- 命运镜像 -->
<div id="mirrorSection" class="sec" style="display:none">
  <div class="sec-hdr" id="hMirror">
    <span class="sec-ttl">🪞 命运镜像</span>
    <span class="chv open" id="cMirror">▼</span>
  </div>
  <div id="bMirror" style="padding:0">
    <div id="mirrorInner"></div>
  </div>
</div>

<div id="ftr">
  <button class="btn-gen" id="btnGen">✦ 生成 Mirra 洞察</button>
  <div id="genStatus" style="display:none"></div>
  <button id="libraryHint" style="display:none">✅ 已保存到资产库 · 查看全部 →</button>
  <button class="btn btn-ghost" id="btnClr" style="margin-top:7px">🗑️ 清空所有 Pin</button>
</div>

<div id="ld"><div class="spin"></div><div style="color:var(--sub);font-size:13px;text-align:center">分析中，请稍候…</div></div>

<script src="sidepanel.js"></script>
</body>
</html>
